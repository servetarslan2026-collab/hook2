services:
  # PostgreSQL
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: webhook
      POSTGRES_PASSWORD: webhook_secret
      POSTGRES_DB: webhook_service
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhook"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # NATS with JetStream
  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-sd", "/data"]
    volumes:
      - natsdata:/data

  # API Server
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      SERVER_PORT: "3000"
      DATABASE_URL: "postgres://webhook:webhook_secret@postgres:5432/webhook_service?sslmode=disable"
      NATS_URL: "nats://nats:4222"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "change-this-to-a-strong-secret-in-production"
      JWT_EXPIRY: "24h"
      WORKER_COUNT: "4"
      FRONTEND_URL: "http://localhost:5173"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:3000"
    environment:
      PUBLIC_API_URL: "http://localhost:3000/api/v1"

volumes:
  pgdata:
  redisdata:
  natsdata:
